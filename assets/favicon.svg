<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @font-face {
        font-family: 'Instrument Serif';
        font-style: italic;
        font-weight: 400;
        src: url('data:font/woff2;base64,') format('woff2');
      }
    </style>
  </defs>
  <!-- Warm cream background -->
  <rect width="32" height="32" fill="#fafaf7"/>
  <!-- Thin top rule in near-black -->
  <rect x="0" y="0" width="32" height="2" fill="#1a1a18"/>
  <!-- "SfP" in Instrument Serif italic -->
  <text
    x="16" y="23"
    font-family="'Instrument Serif', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="14"
    fill="#1a1a18"
    text-anchor="middle"
    dominant-baseline="alphabetic">SfP</text>
  <!-- Crimson underbar -->
  <rect x="5" y="26.5" width="22" height="2.5" fill="#c0392b"/>
</svg>
